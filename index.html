<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ObsMCLauncher - 一款功能强、可定制、跨平台的 Minecraft 启动器。基于 .NET 8 与 Avalonia 构建，支持 Windows、Linux 与 macOS。" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta property="og:title" content="ObsMCLauncher - 你的MC启动器，无限可能" />
    <meta property="og:description" content="功能强、可定制、跨平台的现代化 Minecraft 启动器" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>ObsMCLauncher - 你的MC启动器，无限可能</title>
    <script>
      // 在首次绘制前应用主题，避免闪烁
      (function () {
        try {
          var saved = localStorage.getItem('obsmc-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
